appId: dev.openpets.app
productName: OpenPets
copyright: Copyright © 2026 OpenPets

directories:
  output: dist-electron

artifactName: OpenPets-${version}-${os}-${arch}.${ext}

files:
  - dist/**
  - preload.cjs
  - pet-preload.cjs
  - assets/**
  - package.json

asar: true
asarUnpack:
  - node_modules/**
npmRebuild: false
publish: null

mac:
  icon: assets/app-icon.icns
  category: public.app-category.utilities
  target:
    - dmg
    - zip
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  icon: assets/app-icon.ico
  target:
    - nsis
    - portable
  verifyUpdateCodeSignature: false

nsis:
  artifactName: OpenPets-${version}-win-${arch}-setup.${ext}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

portable:
  artifactName: OpenPets-${version}-win-${arch}-portable.${ext}

linux:
  icon: assets/app-icon.png
  target:
    - AppImage
    - deb
    - tar.gz
  category: Utility
  maintainer: OpenPets
