appId: fun.noelclaw.app
productName: Noel Crew
copyright: Copyright © 2026 noelclaw

directories:
  output: dist-electron

artifactName: NoelCrew-${version}-${os}-${arch}.${ext}

files:
  - dist/**
  - preload.cjs
  - pet-preload.cjs
  - assets/**
  - package.json

extraResources:
  - from: node_modules
    to: node_modules
    filter:
      - "**"
      - "!.pnpm"
      - "!.pnpm/**"
      - "!.bin"
      - "!.bin/**"
      - "!.modules.yaml"
      - "!electron"
      - "!electron/**"
      - "!electron-builder"
      - "!electron-builder/**"
      - "!typescript"
      - "!typescript/**"
      - "!@types"
      - "!@types/**"
      - "!sharp"
      - "!sharp/**"

beforePack: scripts/prepare-deps.cjs

asar: true
asarUnpack:
  - node_modules/**
npmRebuild: false
publish: null

mac:
  icon: assets/app-icon.icns
  category: public.app-category.utilities
  target:
    - dmg
    - zip
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  icon: assets/app-icon.ico
  forceCodeSigning: false
  signAndEditExecutable: false
  target:
    - nsis
    - portable
  verifyUpdateCodeSignature: false

nsis:
  artifactName: NoelCrew-${version}-win-${arch}-setup.${ext}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

portable:
  artifactName: NoelCrew-${version}-win-${arch}-portable.${ext}

linux:
  icon: assets/app-icon.png
  target:
    - AppImage
    - deb
    - tar.gz
  category: Utility
  maintainer: noelclaw
