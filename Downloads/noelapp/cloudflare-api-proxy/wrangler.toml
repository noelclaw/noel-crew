name = "noelclaw-api-proxy"
main = "worker.js"
compatibility_date = "2025-01-01"

# Route: api.noelclaw.xyz/* → this worker
# Cloudflare matches more specific routes first, so this takes priority
# over the *.noelclaw.xyz wildcard in noelclaw-app-router
[[routes]]
pattern = "api.noelclaw.xyz/*"
zone_name = "noelclaw.xyz"

# KV namespace for rate limiting (100 req/min per IP)
# Create it first: wrangler kv:namespace create RATE_LIMIT_KV
# Then replace the id below with the output id
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# CONVEX_URL is a secret — never stored here
# Set it once: wrangler secret put CONVEX_URL
# Paste: https://valuable-fish-533.convex.site
