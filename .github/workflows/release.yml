name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runs-on: windows-latest
            artifact-pattern: "dist-electron/*.exe"
            eb-flag: "--win"
          - os: mac
            runs-on: macos-latest
            artifact-pattern: "dist-electron/*.dmg"
            eb-flag: "--mac"
          - os: linux
            runs-on: ubuntu-latest
            artifact-pattern: "dist-electron/*.AppImage"
            eb-flag: "--linux"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm must be set up before setup-node so the cache key is available.
      # No version pin — reads packageManager field from package.json (pnpm@11.0.8).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm fakeroot

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Package desktop (${{ matrix.os }})
        working-directory: apps/desktop
        env:
          # Prevents GitHub API rate-limiting when electron-builder downloads Electron
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable code-signing auto-discovery on all platforms (unsigned builds)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: node scripts/clean-package-output.cjs && pnpm exec electron-builder ${{ matrix.eb-flag }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: noel-crew-${{ matrix.os }}
          path: apps/desktop/${{ matrix.artifact-pattern }}
          retention-days: 7

  release:
    name: Create Release
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Noel Crew ${{ github.ref_name }}
          body: |
            ## Noel Crew ${{ github.ref_name }}

            Tray-first desktop companion for AI coding agents.

            ### Downloads

            | Platform | File |
            | --- | --- |
            | Windows | `NoelCrew-*-win-x64-setup.exe` |
            | macOS (Apple Silicon) | `NoelCrew-*-mac-arm64.dmg` |
            | macOS (Intel) | `NoelCrew-*-mac-x64.dmg` |
            | Linux | `NoelCrew-*-linux-x86_64.AppImage` |

            > Builds are currently unsigned. macOS/Windows may show a security warning on first launch.
          draft: false
          prerelease: false
          files: release-artifacts/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
